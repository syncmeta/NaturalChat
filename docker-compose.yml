services:
  bot:
    build: .
    volumes:
      - ./bots:/app/bots
      - ./workspace:/app/workspace
      - ./config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker sandbox
    ports:
      - "9000:9000"  # Feishu webhook
    restart: unless-stopped
    env_file:
      - .env

  # Matrix homeserver (Conduit) - lightweight, Rust-based
  # Usage: docker compose --profile matrix up
  conduit:
    image: matrixconduit/matrix-conduit:latest
    profiles: ["matrix"]
    ports:
      - "6167:6167"   # Client API
      - "8448:8448"   # Federation
    volumes:
      - conduit-data:/var/lib/matrix-conduit
    environment:
      CONDUIT_SERVER_NAME: "${CONDUIT_SERVER_NAME:-localhost}"
      CONDUIT_DATABASE_BACKEND: "rocksdb"
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_PORT: "6167"
    restart: unless-stopped

  # Memobase memory system (optional)
  # Usage: docker compose --profile memobase up
  memobase-db:
    image: postgres:15
    profiles: ["memobase"]
    environment:
      POSTGRES_DB: memobase
      POSTGRES_USER: memobase
      POSTGRES_PASSWORD: "${MEMOBASE_DB_PASSWORD:-memobase}"
    volumes:
      - memobase-pg:/var/lib/postgresql/data
    restart: unless-stopped

  memobase-redis:
    image: redis:7
    profiles: ["memobase"]
    restart: unless-stopped

  memobase-api:
    image: memobase/server:latest
    profiles: ["memobase"]
    depends_on:
      - memobase-db
      - memobase-redis
    ports:
      - "8019:8019"
    environment:
      DATABASE_URL: "postgresql://memobase:${MEMOBASE_DB_PASSWORD:-memobase}@memobase-db:5432/memobase"
      REDIS_URL: "redis://memobase-redis:6379"
    restart: unless-stopped

volumes:
  conduit-data:
  memobase-pg:
