<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaturalChat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f8eb; --bg2: #eef0e3; --bg3: #e2e5d6; --bg4: #d4d8c8;
  --fg: #1e1e1e; --fg2: #666; --accent: #5a5fa5; --accent2: #4a4f8e;
  --green: #3a8f3e; --red: #d32f2f; --yellow: #e6a117;
  --radius: 12px; --radius-sm: 8px;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); }
::selection { background: var(--accent); color: #fff; }

/* ── Login ── */
.login-overlay {
  position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100;
}
.login-overlay.hidden { display: none; }
.login-box {
  background: var(--bg2); padding: 40px; border-radius: var(--radius); width: 360px; max-width: 90vw;
}
.login-box h1 { font-size: 20px; margin-bottom: 24px; text-align: center; }
.login-box input {
  width: 100%; padding: 12px 16px; margin-bottom: 12px; background: #fff; border: 1px solid var(--bg4);
  border-radius: var(--radius-sm); color: var(--fg); font-size: 14px; outline: none;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; margin-top: 4px;
}
.login-box button:hover { background: var(--accent2); }
.login-error { color: var(--red); font-size: 13px; margin-top: 8px; text-align: center; }

/* ── Layout ── */
.app { display: flex; height: 100vh; }
.app.hidden { display: none; }

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px; background: var(--bg2); display: flex; flex-direction: column;
  border-right: 1px solid var(--bg3);
}
.sidebar-header {
  padding: 16px 20px; font-size: 15px; font-weight: 600; color: var(--fg2);
  border-bottom: 1px solid var(--bg3); display: flex; align-items: center; gap: 8px;
}
.sidebar-header svg { width: 18px; height: 18px; }
.bot-list { flex: 1; overflow-y: auto; padding: 8px; }
.bot-item {
  padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer;
  margin-bottom: 4px; transition: background 0.15s;
}
.bot-item:hover { background: var(--bg3); }
.bot-item.active { background: var(--bg4); }
.bot-item .bot-name { font-size: 14px; font-weight: 500; }
.bot-item .bot-meta { font-size: 12px; color: var(--fg2); margin-top: 2px; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.main-header {
  padding: 14px 20px; border-bottom: 1px solid var(--bg3); display: flex;
  align-items: center; justify-content: space-between; background: var(--bg2);
}
.main-header h2 { font-size: 16px; font-weight: 500; }
.tab-group { display: flex; gap: 4px; }
.tab-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  background: transparent; color: var(--fg2); border: 1px solid transparent;
}
.tab-btn:hover { background: var(--bg3); }
.tab-btn.active { background: var(--bg4); color: var(--fg); border-color: var(--bg4); }

/* Chat */
.chat-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.chat-view.hidden { display: none; }
.messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
}
.msg { max-width: 75%; padding: 10px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: #fff; border: 1px solid var(--bg4); border-bottom-left-radius: 4px; }
.msg.system { align-self: center; color: var(--fg2); font-size: 12px; background: none; padding: 4px; }
.typing-indicator { align-self: flex-start; color: var(--fg2); font-size: 13px; padding: 4px 8px; }
.typing-indicator::after { content: '...'; animation: dots 1.4s infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

.chat-input-area {
  padding: 12px 20px; border-top: 1px solid var(--bg3); display: flex; gap: 8px; background: var(--bg2);
}
.chat-input-area textarea {
  flex: 1; padding: 10px 14px; background: #fff; border: 1px solid var(--bg4);
  border-radius: var(--radius-sm); color: var(--fg); font-size: 14px; font-family: inherit;
  resize: none; outline: none; min-height: 42px; max-height: 120px;
}
.chat-input-area textarea:focus { border-color: var(--accent); }
.send-btn {
  padding: 0 16px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); cursor: pointer; font-size: 14px;
}
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { opacity: 0.5; cursor: default; }

/* Config */
.config-view { flex: 1; display: flex; flex-direction: column; }
.config-view.hidden { display: none; }
.config-editor {
  flex: 1; padding: 16px; overflow: hidden; display: flex; flex-direction: column;
}
.config-editor textarea {
  flex: 1; width: 100%; background: #fff; border: 1px solid var(--bg4);
  border-radius: var(--radius-sm); color: var(--fg); font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
  font-size: 13px; padding: 16px; resize: none; outline: none; line-height: 1.6; tab-size: 2;
}
.config-editor textarea:focus { border-color: var(--accent); }
.config-actions {
  padding: 12px 16px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--bg3);
}
.config-actions button {
  padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none;
}
.btn-save { background: var(--green); color: #fff; }
.btn-save:hover { opacity: 0.9; }
.btn-restart { background: var(--yellow); color: #fff; }
.btn-restart:hover { opacity: 0.9; }
.config-status { font-size: 13px; color: var(--fg2); align-self: center; margin-right: auto; }

/* Empty state */
.empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--fg2); font-size: 15px;
}

/* Mobile */
@media (max-width: 640px) {
  .sidebar { width: 100%; position: fixed; z-index: 10; height: 100vh; transform: translateX(-100%); transition: transform 0.2s; }
  .sidebar.open { transform: translateX(0); }
  .msg { max-width: 90%; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bbb; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>NaturalChat</h1>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div class="app hidden" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      Bots
    </div>
    <div class="bot-list" id="botList"></div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader" style="display:none">
      <h2 id="currentBotName">—</h2>
      <div class="tab-group">
        <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" data-tab="config" onclick="switchTab('config')">Config</button>
      </div>
    </div>

    <div class="empty-state" id="emptyState">Select a bot to start chatting</div>

    <div class="chat-view hidden" id="chatView">
      <div class="messages" id="messages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="Type a message..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <div class="config-view hidden" id="configView">
      <div class="config-editor">
        <textarea id="configEditor" spellcheck="false"></textarea>
      </div>
      <div class="config-actions">
        <span class="config-status" id="configStatus"></span>
        <button class="btn-save" onclick="saveConfig()">Save</button>
        <button class="btn-restart" onclick="restartBot()">Restart Bot</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('nc_token') || '';
let currentBot = null;
let ws = null;
let bots = [];
let chatHistories = {}; // bot_name -> [{role, text}]

// ── Auth ──
async function doLogin() {
  const user = document.getElementById('loginUser').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('nc_token', token);
      showApp();
    } else {
      errEl.textContent = data.error || 'Login failed';
    }
  } catch (e) {
    errEl.textContent = 'Connection failed';
  }
}

function logout() {
  token = '';
  localStorage.removeItem('nc_token');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

async function showApp() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await loadBots();
}

// ── Bots ──
async function loadBots() {
  try {
    const res = await fetch(`${API}/api/bots`, {headers: {'Authorization': `Bearer ${token}`}});
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    bots = data.bots || [];
    renderBotList();
  } catch (e) {
    console.error('Failed to load bots:', e);
  }
}

function renderBotList() {
  const el = document.getElementById('botList');
  el.innerHTML = bots.map(b => `
    <div class="bot-item ${currentBot === b.name ? 'active' : ''}" onclick="selectBot('${b.name}')">
      <div class="bot-name">${b.name}</div>
      <div class="bot-meta">${b.platforms.join(', ')} · ${b.model}</div>
    </div>
  `).join('');
}

function selectBot(name) {
  currentBot = name;
  renderBotList();
  document.getElementById('mainHeader').style.display = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('currentBotName').textContent = name;
  switchTab('chat');
  connectWS();
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('chatView').classList.toggle('hidden', tab !== 'chat');
  document.getElementById('configView').classList.toggle('hidden', tab !== 'config');
  if (tab === 'config') loadConfig();
  if (tab === 'chat') renderMessages();
}

// ── Chat ──
function connectWS() {
  if (ws) { ws.close(); ws = null; }
  if (!currentBot) return;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const session = getSessionId();
  ws = new WebSocket(`${proto}://${location.host}/ws/chat/${currentBot}?token=${token}&session=${session}`);

  ws.onmessage = (evt) => {
    try {
      const data = JSON.parse(evt.data);
      if (data.type === 'message') {
        addMessage('bot', data.text);
      } else if (data.type === 'typing') {
        showTyping(true);
      } else if (data.type === 'typing_stop') {
        showTyping(false);
      } else if (data.type === 'error') {
        addMessage('system', data.text);
      }
    } catch (e) {}
  };

  ws.onclose = () => { ws = null; };
  ws.onerror = () => { ws = null; };
}

function getSessionId() {
  let sid = localStorage.getItem('nc_session');
  if (!sid) {
    sid = 'web_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('nc_session', sid);
  }
  return sid;
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({text}));
  addMessage('user', text);
  input.value = '';
  autoResize(input);
}

function addMessage(role, text) {
  if (!currentBot) return;
  if (!chatHistories[currentBot]) chatHistories[currentBot] = [];
  chatHistories[currentBot].push({role, text});
  showTyping(false);
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');
  const history = chatHistories[currentBot] || [];
  el.innerHTML = history.map(m =>
    `<div class="msg ${m.role}">${escapeHtml(m.text)}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}

function showTyping(show) {
  let el = document.getElementById('typingIndicator');
  if (show && !el) {
    el = document.createElement('div');
    el.id = 'typingIndicator';
    el.className = 'typing-indicator';
    el.textContent = 'Thinking';
    document.getElementById('messages').appendChild(el);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  } else if (!show && el) {
    el.remove();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Config ──
async function loadConfig() {
  if (!currentBot) return;
  const status = document.getElementById('configStatus');
  status.textContent = 'Loading...';
  try {
    const res = await fetch(`${API}/api/bots/${currentBot}/config`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    document.getElementById('configEditor').value = data.config || '';
    status.textContent = '';
  } catch (e) {
    status.textContent = 'Failed to load';
  }
}

async function saveConfig() {
  if (!currentBot) return;
  const status = document.getElementById('configStatus');
  const config = document.getElementById('configEditor').value;
  status.textContent = 'Saving...';
  try {
    const res = await fetch(`${API}/api/bots/${currentBot}/config`, {
      method: 'PUT',
      headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({config})
    });
    const data = await res.json();
    status.textContent = data.ok ? 'Saved' : (data.error || 'Failed');
    setTimeout(() => { if (status.textContent === 'Saved') status.textContent = ''; }, 3000);
  } catch (e) {
    status.textContent = 'Save failed';
  }
}

async function restartBot() {
  if (!currentBot) return;
  const status = document.getElementById('configStatus');
  status.textContent = 'Restarting...';
  try {
    const res = await fetch(`${API}/api/bots/${currentBot}/restart`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${token}`}
    });
    const data = await res.json();
    status.textContent = data.ok ? 'Restarted' : (data.error || 'Failed');
    if (data.ok) {
      setTimeout(() => { loadBots(); connectWS(); status.textContent = ''; }, 2000);
    }
  } catch (e) {
    status.textContent = 'Restart failed';
  }
}

// ── Init ──
(async () => {
  if (token) {
    try {
      const res = await fetch(`${API}/api/bots`, {headers: {'Authorization': `Bearer ${token}`}});
      if (res.ok) { showApp(); return; }
    } catch (e) {}
  }
  document.getElementById('loginOverlay').classList.remove('hidden');
})();
</script>
</body>
</html>
