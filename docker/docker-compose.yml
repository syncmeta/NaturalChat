services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["bot"]
    network_mode: host
    volumes:
      - ../bots:/app/bots
      - ../workspace:/app/workspace
      - ../logs:/app/logs
      - ../config:/app/config:ro
      - ../web_panel.yaml:/app/web_panel.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker sandbox
    restart: unless-stopped
    env_file:
      - ../.env

  # Matrix homeserver (Conduit) - lightweight, Rust-based
  # Usage: docker compose --profile matrix up
  conduit:
    image: matrixconduit/matrix-conduit:latest
    profiles: ["matrix"]
    network_mode: host
    volumes:
      - conduit-data:/var/lib/matrix-conduit
      - ./conduit.toml:/etc/conduit/conduit.toml:ro
    environment:
      CONDUIT_CONFIG: "/etc/conduit/conduit.toml"
      CONDUIT_SERVER_NAME: "${CONDUIT_SERVER_NAME:-localhost}"
      CONDUIT_PORT: "${CONDUIT_PORT:-6167}"
      CONDUIT_ALLOW_REGISTRATION: "${CONDUIT_ALLOW_REGISTRATION:-true}"
    restart: unless-stopped

  # Honcho memory system (optional)
  # Usage: docker compose --profile honcho up
  honcho-db:
    image: pgvector/pgvector:pg17
    profiles: ["honcho"]
    environment:
      POSTGRES_DB: honcho
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: "${HONCHO_DB_PASSWORD:-honcho}"
    volumes:
      - honcho-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  honcho-migrate:
    image: ghcr.io/plastic-labs/honcho:latest
    profiles: ["honcho"]
    depends_on:
      honcho-db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    environment:
      DB_CONNECTION_URI: "postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho"
    restart: "no"

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:latest
    profiles: ["honcho"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-migrate:
        condition: service_completed_successfully
    ports:
      - "${HONCHO_PORT:-8080}:8000"
    environment:
      DB_CONNECTION_URI: "postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho"
      AUTH_USE_AUTH: "false"
      # Route all LLM tasks through OpenRouter (OpenAI-compatible)
      LLM_OPENAI_BASE_URL: "${HONCHO_LLM_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_OPENAI_API_KEY: "${HONCHO_LLM_API_KEY:-}"
      LLM_EMBEDDING_PROVIDER: "openai"
      DERIVER_PROVIDER: "openai"
      DERIVER_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      SUMMARY_PROVIDER: "openai"
      SUMMARY_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DREAM_PROVIDER: "openai"
      DREAM_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MINIMAL__PROVIDER: "openai"
      DIALECTIC_LEVELS__MINIMAL__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MINIMAL__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC_LEVELS__MINIMAL__MAX_TOOL_ITERATIONS: "1"
      DIALECTIC_LEVELS__LOW__PROVIDER: "openai"
      DIALECTIC_LEVELS__LOW__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__LOW__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC_LEVELS__LOW__MAX_TOOL_ITERATIONS: "5"
      DIALECTIC_LEVELS__MEDIUM__PROVIDER: "openai"
      DIALECTIC_LEVELS__MEDIUM__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MEDIUM__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC_LEVELS__MEDIUM__MAX_TOOL_ITERATIONS: "2"
      DIALECTIC_LEVELS__HIGH__PROVIDER: "openai"
      DIALECTIC_LEVELS__HIGH__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__HIGH__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC_LEVELS__HIGH__MAX_TOOL_ITERATIONS: "4"
      DIALECTIC_LEVELS__MAX__PROVIDER: "openai"
      DIALECTIC_LEVELS__MAX__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MAX__THINKING_BUDGET_TOKENS: "2048"
      DIALECTIC_LEVELS__MAX__MAX_TOOL_ITERATIONS: "10"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:latest
    profiles: ["honcho"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.deriver"]
    environment:
      DB_CONNECTION_URI: "postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho"
      LLM_OPENAI_BASE_URL: "${HONCHO_LLM_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_OPENAI_API_KEY: "${HONCHO_LLM_API_KEY:-}"
      LLM_EMBEDDING_PROVIDER: "openai"
      DERIVER_PROVIDER: "openai"
      DERIVER_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      SUMMARY_PROVIDER: "openai"
      SUMMARY_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DREAM_PROVIDER: "openai"
      DREAM_MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MINIMAL__PROVIDER: "openai"
      DIALECTIC_LEVELS__MINIMAL__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MINIMAL__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC_LEVELS__MINIMAL__MAX_TOOL_ITERATIONS: "1"
      DIALECTIC_LEVELS__LOW__PROVIDER: "openai"
      DIALECTIC_LEVELS__LOW__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__LOW__THINKING_BUDGET_TOKENS: "0"
      DIALECTIC_LEVELS__LOW__MAX_TOOL_ITERATIONS: "5"
      DIALECTIC_LEVELS__MEDIUM__PROVIDER: "openai"
      DIALECTIC_LEVELS__MEDIUM__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MEDIUM__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC_LEVELS__MEDIUM__MAX_TOOL_ITERATIONS: "2"
      DIALECTIC_LEVELS__HIGH__PROVIDER: "openai"
      DIALECTIC_LEVELS__HIGH__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__HIGH__THINKING_BUDGET_TOKENS: "1024"
      DIALECTIC_LEVELS__HIGH__MAX_TOOL_ITERATIONS: "4"
      DIALECTIC_LEVELS__MAX__PROVIDER: "openai"
      DIALECTIC_LEVELS__MAX__MODEL: "${HONCHO_LLM_MODEL:-openrouter/auto}"
      DIALECTIC_LEVELS__MAX__THINKING_BUDGET_TOKENS: "2048"
      DIALECTIC_LEVELS__MAX__MAX_TOOL_ITERATIONS: "10"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Crawl4AI - LLM-ready web crawling (optional)
  # Usage: docker compose --profile crawl4ai up
  crawl4ai:
    image: unclecode/crawl4ai:latest
    profiles: ["crawl4ai"]
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    shm_size: 1g
    restart: unless-stopped

  # RSSHub - RSS feed aggregation (optional)
  # Usage: docker compose --profile rsshub up
  rsshub:
    image: diygod/rsshub:latest
    profiles: ["rsshub"]
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    restart: unless-stopped

volumes:
  conduit-data:
  honcho-pg:
