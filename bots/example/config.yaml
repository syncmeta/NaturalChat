# NaturalChat Bot configuration template (non-sensitive)
# Credentials go in secrets.yaml (same directory).
# Prompts go in prompts/ directory; see prompts/registry.yaml for details.

# ── Transport platforms ──────────────────────────────────────────────────────
# Enable at least one platform. Token/password go in secrets.yaml.
transports:
  telegram:
    enabled: true
    # token -> secrets.yaml

  # matrix:
  #   enabled: true
  #   homeserver_url: "https://matrix.org"
  #   user_id: "@mybot:matrix.org"
  #   # access_token / password -> secrets.yaml

  # feishu:
  #   enabled: true
  #   app_id: ""
  #   webhook_port: 9000
  #   # app_secret / verification_token / encrypt_key -> secrets.yaml

  # xmpp:
  #   enabled: true
  #   jid: "bot@your-server.com"
  #   xmpp_host: "localhost"
  #   xmpp_port: 5222
  #   # password -> secrets.yaml

# ── Message timing ───────────────────────────────────────────────────────────
# How long to wait before processing a new message (seconds).
# Gives the user time to send follow-up messages.
msg_wait_initial: 2.5

# After the typing indicator stops, wait this long before responding.
msg_wait_after_typing_stop: 5.0

# Hard timeout: respond even if the user appears to still be typing.
typing_hard_timeout: 10.0

# ── Reflection ───────────────────────────────────────────────────────────────
# After this many seconds of silence, the bot may internally reflect
# on the conversation (can trigger proactive messages).
reflection_delay: 30

# ── LLM ──────────────────────────────────────────────────────────────────────
# Main chat model. Supports any OpenAI-compatible API.
# Default: OpenRouter (https://openrouter.ai) — supports 200+ models.
llm:
  base_url: "https://openrouter.ai/api/v1"
  model: "openrouter/auto"
  # Maximum tokens of chat history to include in each request.
  max_history_tokens: 4000
  # api_key -> secrets.yaml

# ── Token budget ─────────────────────────────────────────────────────────────
# Score-based system for prioritizing which contacts get responses.
# Higher score = higher priority.
token_budget:
  default_score: 50

# ── Additional models (optional) ─────────────────────────────────────────────
# Specialized models for specific tasks. Each can use a different provider.
# Uncomment and configure as needed.
# models:
#   - name: "critic-1"
#     role: critic            # Reviews bot responses before sending
#     model: "openrouter/auto"
#   - name: "critic-2"
#     role: critic
#     model: "openrouter/auto"
#   - name: "surfing-planner"
#     role: surfing           # Plans autonomous web browsing queries
#     model: "openrouter/auto"
#   - name: "surfing-evaluator"
#     role: surfing_eval      # Evaluates surfing results for relevance
#     model: "openrouter/auto"
#   - name: "debounce"
#     role: debounce          # Judges if user is still typing (no typing indicator)
#     model: "openrouter/auto"

# ── Critic (optional) ────────────────────────────────────────────────────────
# Independent review of bot responses. When enabled, a separate model checks
# each response and may trigger a correction if issues are found.
critic:
  enabled: false
  # trigger_marker: "[NEED_REVIEW]"  # Marker in response that triggers review
  # correction_delay: 5.0            # Seconds before sending correction
  # timeout: 30                      # Max seconds to wait for critic response

# ── Surfing (optional) ───────────────────────────────────────────────────────
# Autonomous background web browsing. The bot proactively searches for
# content that may interest its contacts, based on conversation history.
# Also uses RSS feeds if configured in global config.yaml.
surfing:
  enabled: false
  # min_interval: 1800       # Minimum seconds between surfing rounds
  # max_interval: 7200       # Maximum seconds between rounds
  # max_queries_per_round: 3 # Max search queries per surfing round
  # idle_threshold: 7200     # Consider contact idle after this many seconds
  # quiet_hours: [0, 8]      # Don't surf during these hours (24h format)

# ── Firecrawl (optional) ──────────────────────────────────────────────────────
# Web page scraping API for surfing. Renders JavaScript and extracts clean
# Markdown content — much better than raw HTML stripping.
# Self-host: docker run -p 3002:3002 mendableai/firecrawl
# Or use cloud: https://firecrawl.dev
# Without Firecrawl, surfing falls back to basic HTTP fetch + HTML stripping.
# firecrawl:
#   url: "http://localhost:3002"
#   # api_key -> secrets.yaml  (not needed for self-hosted)

# ── Memobase (optional) ──────────────────────────────────────────────────────
# Long-term memory system. Remembers user preferences, conversation context,
# and personality across sessions. Requires Docker.
# Start with: docker compose --profile memobase up -d
# Without Memobase, the bot has no persistent per-user memory — it only
# remembers what fits in the LLM's sliding history window.
memobase:
  url: ""
  # api_key -> secrets.yaml
