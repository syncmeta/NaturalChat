name: naturalchat4-memobase

services:
  memobase-db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    container_name: naturalchat4-memobase-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "${DATABASE_EXPORT_PORT}:5432"
    volumes:
      - ${DATABASE_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  memobase-redis:
    image: redis:7.4
    restart: unless-stopped
    container_name: naturalchat4-memobase-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_EXPORT_PORT}:6379"
    volumes:
      - ${REDIS_LOCATION}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  memobase-api:
    image: ghcr.io/memodb-io/memobase:latest
    restart: unless-stopped
    container_name: naturalchat4-memobase-api
    depends_on:
      memobase-db:
        condition: service_healthy
      memobase-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@memobase-db:5432/${DATABASE_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@memobase-redis:6379/0
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PROJECT_ID: ${PROJECT_ID}
      API_HOSTS: ${API_HOSTS}
      USE_CORS: ${USE_CORS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_EXPORT_PORT}:8000"
    volumes:
      - ../memobase/config.yaml:/app/config.yaml:ro
